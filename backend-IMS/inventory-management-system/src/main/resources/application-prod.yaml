spring:
  application:
    name: inventory-management-system

  datasource:
    url: ${DATA_SOURCE_URL}
    username: ${DATA_SOURCE_USERNAME}
    password: ${DATA_SOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false # for debugging
    properties:
      hibernate:
        format_sql: false # for debugging
    database-platform: org.hibernate.dialect.MySQLDialect

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

backendUrl: ${BACKEND_URL}
frontendUrl: ${FRONTEND_URL}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

application:
  security:
    jwt:
      expiration: 900000 # 15 minutes
      refresh:
        expiration: 2592000000 # 30 days
        cleanup-cron: ${CLEAN_UP_CRON} # hourly cleanup of expired/revoked tokens
      secret-key: ${JWT_SECRETE_KEY}